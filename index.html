<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>صفحة الموصّل — توصيل حائل</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@400;500;600;700&display=swap" rel="stylesheet">

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'IBM Plex Sans Arabic', system-ui, sans-serif;
    background: #EEF4F6; color: #1B2A31; min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  @keyframes fadeUp { from { opacity:0; transform: translateY(10px);} to { opacity:1; transform: translateY(0);} }

  header {
    background: #16323D; color: #fff; padding: 18px 20px;
    display: flex; align-items: center; gap: 12px;
    position: sticky; top: 0; z-index: 20; border-bottom: 3px solid #37A24C;
  }
  header .title { font-size: 15px; font-weight: 700; }
  header .sub { font-size: 11.5px; color: rgba(255,255,255,.6); margin-top: 1px; }

  .wrap { max-width: 540px; margin: 0 auto; padding: 16px; }

  .empty-state { text-align: center; padding: 80px 24px; color: #7A8F98; }
  .empty-state svg { color: #B6C8D0; margin-bottom: 16px; }
  .empty-state h3 { font-size: 16px; font-weight: 600; color: #2B4049; margin-bottom: 6px; }

  .card {
    background: #fff; border-radius: 16px; padding: 18px;
    box-shadow: 0 1px 2px rgba(16,52,66,.04), 0 12px 28px -20px rgba(16,52,66,.25);
    margin-bottom: 14px; animation: fadeUp .3s ease;
    border: 1px solid #E6EFF2;
  }
  .card-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 10px; margin-bottom: 12px; }
  .patient-name { font-size: 16px; font-weight: 700; color: #16323D; }
  .patient-meta { font-size: 12px; color: #7A8F98; margin-top: 3px; }
  .status-pill { display: inline-flex; align-items: center; gap: 6px; padding: 5px 11px; border-radius: 20px; font-size: 11.5px; font-weight: 600; white-space: nowrap; flex-shrink: 0; }
  .status-dot { width: 6px; height: 6px; border-radius: 50%; }

  .info-row { display: flex; align-items: center; gap: 8px; padding: 9px 0; border-top: 1px solid #F0F4F6; font-size: 13px; }
  .info-row svg { color: #9AAEB6; flex-shrink: 0; }
  .info-row a { color: #137CAE; text-decoration: none; font-weight: 600; direction: ltr; }
  .info-row .branch-pill { font-size: 11px; font-weight: 600; padding: 3px 9px; border-radius: 20px; background: #EEF4F6; color: #5C7079; }

  .notes-box { margin-top: 10px; padding: 10px 12px; background: #F7FAFB; border-radius: 10px; font-size: 12.5px; color: #3A525C; line-height: 1.6; border: 1px solid #EEF2F4; }

  .actions { display: flex; gap: 10px; margin-top: 14px; }
  .btn-call {
    flex: 1; height: 46px; border-radius: 12px; border: 1px solid #E2EBEF; background: #fff;
    color: #2B4049; font-size: 13.5px; font-weight: 600; display: flex; align-items: center;
    justify-content: center; gap: 8px; text-decoration: none; cursor: pointer;
  }
  .btn-done {
    flex: 2; height: 46px; border-radius: 12px; border: none; background: #37A24C; color: #fff;
    font-size: 14px; font-weight: 700; display: flex; align-items: center; justify-content: center;
    gap: 8px; cursor: pointer; box-shadow: 0 6px 16px -6px rgba(55,162,76,.55); transition: all .15s;
  }
  .btn-done:hover { background: #2C8A40; }
  .btn-done:disabled { background: #B6C8D0; box-shadow: none; cursor: default; }

  .btn-start {
    flex: 2; height: 46px; border-radius: 12px; border: none; background: #2AA1D4; color: #fff;
    font-size: 14px; font-weight: 700; display: flex; align-items: center; justify-content: center;
    gap: 8px; cursor: pointer; box-shadow: 0 6px 16px -6px rgba(42,161,212,.55); transition: all .15s;
  }
  .btn-start:hover { background: #1E91C4; }

  .done-banner {
    display: flex; align-items: center; gap: 8px; padding: 10px 12px; background: #E8F5EC;
    color: #2C7E3C; border-radius: 10px; font-size: 12.5px; font-weight: 600; margin-top: 12px;
  }

  .toast {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(20px);
    background: #16323D; color: #fff; padding: 13px 22px; border-radius: 12px;
    font-size: 13.5px; font-weight: 500; z-index: 300; white-space: nowrap;
    box-shadow: 0 16px 40px -12px rgba(13,38,48,.5);
    opacity: 0; pointer-events: none; transition: all .25s ease;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  .footnote { text-align: center; font-size: 11px; color: #9AAEB6; padding: 20px 0 8px; }
</style>
</head>

<script>
// ════════════════════════════════════════════════════════════════════════
//  DATA LAYER — متصل بـ Firestore، يتزامن لحظياً مع لوحة الصيدلاني
// ════════════════════════════════════════════════════════════════════════
let orders = [];

// ── FIREBASE — متصل الآن ──────────────────────────────────────────────
const firebaseConfig = {
  apiKey: "AIzaSyBbEccCT3NRneb_UWstMv0GYaXvrvms0OE",
  authDomain: "pharmcy-sgh.firebaseapp.com",
  projectId: "pharmcy-sgh",
  storageBucket: "pharmcy-sgh.firebasestorage.app",
  messagingSenderId: "22468578998",
  appId: "1:22468578998:web:6c77d9f128764cd6a56017"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
db.collection('orders').onSnapshot(snap => {
  orders = snap.docs.map(d => ({ id: d.id, ...d.data() }));
  render();
}, err => {
  console.error('Firestore error:', err);
  showToast('⚠️ تعذّر الاتصال بقاعدة البيانات');
});
function persistOrder(o) { db.collection('orders').doc(o.id).set(o); }
// ──────────────────────────────────────────────────────────────────────

function fmtTime(ts) {
  const d = new Date(ts);
  return d.toLocaleDateString('ar-SA') + ' ' + d.toLocaleTimeString('ar-SA', {hour:'2-digit',minute:'2-digit'});
}

const STATUS = {
  new:        { label:'جديد',          bg:'#EEF0FF', color:'#3730A3', dot:'#3730A3' },
  preparing:  { label:'جاري التحضير',  bg:'#FBF1E0', color:'#B5751A', dot:'#D97706' },
  ready:      { label:'جاهزة',         bg:'#E6FBF8', color:'#0E7A70', dot:'#0E9488' },
  delivering: { label:'جاري التوصيل',  bg:'#E6F4FB', color:'#137CAE', dot:'#2AA1D4' },
  done:       { label:'تم التوصيل',    bg:'#E8F5EC', color:'#2C7E3C', dot:'#37A24C' },
};

// Read ?id= from the URL — if present, show only that order; else show active deliveries
const urlId = new URLSearchParams(location.search).get('id');

function render() {
  const wrap = document.getElementById('wrap');

  let items = urlId
    ? orders.filter(o => o.id === urlId)
    : orders.filter(o => o.status === 'ready' || o.status === 'delivering')
            .sort((a,b) => b.ts - a.ts);

  if (!items.length) {
    wrap.innerHTML = `<div class="empty-state">
      <svg width="56" height="56" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="3" width="15" height="13" rx="2"/><path d="M16 8h4l3 3v5h-7V8z"/><circle cx="5.5" cy="18.5" r="2.5"/><circle cx="18.5" cy="18.5" r="2.5"/></svg>
      <h3>لا توجد طلبات حالياً</h3>
      <p>سيظهر هنا أي طلب جاهز للتوصيل</p>
    </div>`;
    return;
  }

  wrap.innerHTML = items.map(o => {
    const st = STATUS[o.status] || STATUS.new;
    const isDone = o.status === 'done';
    const isReady = o.status === 'ready';
    return `
    <div class="card">
      <div class="card-top">
        <div>
          <div class="patient-name">${o.name || '—'}</div>
          <div class="patient-meta">طلب ${o.id} · ${fmtTime(o.ts)}</div>
        </div>
        <span class="status-pill" style="background:${st.bg};color:${st.color};"><span class="status-dot" style="background:${st.dot}"></span>${st.label}</span>
      </div>

      <div class="info-row">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
        <a href="tel:${o.phone}">${o.phone || '—'}</a>
      </div>
      <div class="info-row">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
        <span class="branch-pill">${o.branch || '—'}</span>
        <span style="color:#9AAEB6;">· ملف ${o.fileNo || '—'}</span>
      </div>

      ${o.notes ? `<div class="notes-box">${o.notes}</div>` : ''}

      ${isDone ? `
        <div class="done-banner">✓ تم تأكيد التوصيل لهذا الطلب</div>
      ` : isReady ? `
        <div class="actions">
          <a href="tel:${o.phone}" class="btn-call">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
            اتصال
          </a>
          <button class="btn-start" onclick="startDelivering('${o.id}')">
            <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="3" width="15" height="13" rx="2"/><path d="M16 8h4l3 3v5h-7V8z"/><circle cx="5.5" cy="18.5" r="2.5"/><circle cx="18.5" cy="18.5" r="2.5"/></svg>
            بدء التوصيل
          </button>
        </div>
      ` : `
        <div class="actions">
          <a href="tel:${o.phone}" class="btn-call">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
            اتصال
          </a>
          <button class="btn-done" onclick="markDone('${o.id}')">
            <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
            تم التوصيل
          </button>
        </div>
      `}
    </div>`;
  }).join('');

  if (!urlId) {
    wrap.insertAdjacentHTML('beforeend', `<div class="footnote">تعرض هذه الصفحة الطلبات الجاهزة وقيد التوصيل تلقائياً</div>`);
  }
}

function startDelivering(id) {
  const o = orders.find(x => x.id === id);
  if (!o) return;
  o.status = 'delivering';
  if (!o.tsDelivering) o.tsDelivering = Date.now();
  persistOrder(o);
  showToast('🚗 تم بدء التوصيل');
}

function markDone(id) {
  if (!confirm('تأكيد أن الطلب تم تسليمه للمريض؟')) return;
  const o = orders.find(x => x.id === id);
  if (!o) return;
  o.status = 'done';
  if (!o.tsDone) o.tsDone = Date.now();
  persistOrder(o);
  showToast('✅ تم تأكيد التوصيل — شكراً لك');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2800);
}

render();
</script>
</body>
</html>
